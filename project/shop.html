<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shop — yujinsoffice</title>
  <meta name="description" content="yujinsoffice shop — coming soon">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #fff; height: 100%; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #111;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    ::selection { background: #2F2DE4; color: #fff; }

    /* ── Header ── */
    .site-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 22px 36px 16px;
      border-bottom: 2px solid #111;
    }
    .brand {
      font-family: 'Helvetica Neue', 'Archivo Narrow', sans-serif;
      font-stretch: condensed;
      font-weight: 700;
      font-size: 103px;
      letter-spacing: -.01em;
      line-height: 1;
    }
    .topnav {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 21px;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .topnav .sep { opacity: .3; }
    .topnav a { transition: color .2s; }
    .topnav a:hover { color: #2F2DE4; }
    .topnav a.active { color: #2F2DE4; font-weight: 700; }

    /* ── Center content ── */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 36px;
      gap: 28px;
    }
    .big-label {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #2F2DE4;
    }
    .big-heading {
      font-family: 'Helvetica Neue', 'Archivo Narrow', sans-serif;
      font-stretch: condensed;
      font-weight: 700;
      font-size: clamp(72px, 12vw, 160px);
      letter-spacing: -.03em;
      line-height: .88;
      text-transform: uppercase;
      margin: 0;
    }
    /* ── Footer ── */
    footer {
      background: #111;
      color: #fff;
      padding: 28px 36px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    footer .dim { opacity: .55; }

    /* ── Mobile ── */
    @media (max-width: 680px) {
      .site-head { flex-wrap: wrap; gap: 10px; padding: 16px 20px 12px; }
      .brand { font-size: clamp(40px, 10.5vw, 64px); }
      .topnav { font-size: 12px; gap: 9px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <header class="site-head">
    <a href="index.html" class="brand">yujinsoffice</a>
    <nav class="topnav">
      <a href="about.html">About</a>
      <span class="sep">/</span>
      <a href="index.html">Projects</a>
      <span class="sep">/</span>
      <a href="upcoming.html">Upcoming</a>
      <span class="sep">/</span>
      <a href="shop.html" class="active">Shop</a>
    </nav>
  </header>

  <div class="center">
    <div class="big-label">Shop — Coming Soon</div>
    <h1 class="big-heading">Opening<br>Soon</h1>
  </div>

  <footer>
    <span>yujinsoffice</span>
    <span class="dim">© 2026 — Filmmaker &amp; Director, Seoul</span>
  </footer>


</body>
</html>
